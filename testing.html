<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>arrowjs aluminum testing</title>
</head>
<body>
<div id="target"></div>

<script type="importmap">
    {
        "imports":{
            "@arrow-js/core": "https://esm.sh/@arrow-js/core@1.0.0-alpha.10"
        }
    }
</script>
<script type="module">
    import createGenerator from "/dist/ArrowElementGenerator.js";
    import {ref} from "/dist/utils.js";
    import {html} from "@arrow-js/core"
    import Router, {PageAttachedRouter} from "/dist/Router.js";

    const buttons = createGenerator("span", {
        style:`display:inline-block;
            padding:0.5em 1em;
            background-color:#0003;
            border-radius: 1em;
            user-select:none;
            cursor:pointer;`,
    }, (onClick, attributes)=> {
        attributes["@click"] = onClick;
    } );

    const hehe = ref(0);

    const subRouter2 = new Router(undefined, (t, v, s)=> {
        s.raw=true;
        html`subrouter2: ${t}`
    });
    subRouter2.addRoute(":a", (vars)=>html`subsub a ${JSON.stringify(vars)}`);
    subRouter2.addRoute(":b", (vars)=>html`subsub b ${JSON.stringify(vars)}`);
    subRouter2.addRoute(":c", (vars)=>html`subsub c ${JSON.stringify(vars)}`);

    const subRouter = new Router(undefined, (template, vars)=>html`[${template}]:${vars.subRouter}`);
    subRouter.addRoute("", (vars)=>html`subrouter says hi`);
    subRouter.addRoute(":var2", (vars)=>html`owo subrouter says: ${vars.var2}`);
    subRouter.addRoute(":var3/:var4", (vars)=>html`hmm: ${vars.var3} ${vars.var4}`);
    subRouter.addRoute(":var5/:var6/sub", subRouter2);

    const router = new PageAttachedRouter(document.getElementById("target"), undefined, (template, vars, state)=>{
        if(state.raw) return template;
        return html`<${template}>\n${state.path}`;
    });
    // router.addRoute(":test", (vars) => html`testing :3 ${vars.test} * ${vars.test2} * ${vars.test3} ${Math.random()}`);
    router.addRoute("owo", (vars) => html`testing :3 ${buttons.create(()=>console.log("owo"))`${()=>hehe.value}`} ${
            router.link.create("./subRouter")`haii`}`);
    router.addRoute("owo/owo/owo/owo", (vars) => html`testing :3 ${buttons.create(()=>console.log("owo"))`${()=>hehe.value}`} ${
        router.link.create("./subRouter?test#test")`haii`}`);
    router.addRoute("subRouter", (vars)=>html`:333333333333 `);
    router.addRoute(":subRouter", subRouter);
    router.redirect();

    setInterval(()=>hehe.value = Math.random(), 1000)
</script>
</body>
</html>
